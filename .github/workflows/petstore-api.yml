name: PetStore API Tests with Allure History
on: 
  push: 
    branches: 
      - main
      - master
  pull_request:
  workflow_dispatch:
jobs: 
   test:
     runs-on: ubuntu-latest
     steps:
     - name: Checkout Repository
       uses: actions/checkout@v4

     - name: Setup Node.js
       uses: actions/setup-node@v4
       with:
        node-version: 20

     - name: Install Dependencies
       run: npm ci

     - name: Install Playwright Browsers
       run: npx playwright install --with-deps

     - name: Run Playwright Tests
       env:
        BASE_URL: ${{ secrets.BASE_URL }}
       run: npx playwright test tests/Practice/PetStore.test.ts

  # Download previous gh-pages branch
     - name: Checkout gh-pages branch
       if: always()
       continue-on-error: true
       uses: actions/checkout@v4
       with:
        ref: gh-pages
        path: gh-pages

  # Generate report + merge history
     - name: Build Allure Report
       if: always()
       uses: simple-elf/allure-report-action@master
       with:
        gh_pages: gh-pages
        allure_history: allure-history
        allure_results: allure-results

  # Publish updated report
     - name: Deploy Allure Report to GitHub Pages
       if: always()
       uses: peaceiris/actions-gh-pages@v3
       with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history

  # Optional Playwright HTML artifact
     - name: Upload Playwright HTML Report
       if: always()
       uses: actions/upload-artifact@v4
       with:
        name: playwright-report
        path: playwright-report
